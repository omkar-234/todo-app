name: Deploy via Ansible

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: sudo apt update && sudo apt install ansible -y

      - name: Run Playbook
        run: ansible-playbook -i ansible/inventory ansible/deploy.yml
