name: Deploy Todo App

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy on EC2
        run: |
          cd ~/todo-app
          git pull origin main
          docker stop todo-app || true
          docker rm todo-app || true
          docker build -t todo-app .
          docker run -d -p 5000:5000 --name todo-app todo-app
